/**:
  ros__parameters:
    debug: true
    target_frame: odom_vision
    max_armor_distance: 10.0

    ekf:
      # 预测
      sigma2_q_x: 20.0
      sigma2_q_y: 20.0
      sigma2_q_z: 5.0
      sigma2_q_yaw: 100.0
      sigma2_q_r: 800.0

